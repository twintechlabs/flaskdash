{% extends "common/dark_base.html" %}

{% block breadcrumb %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb my-0">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item">My Account</li>
    <li class="breadcrumb-item active">User Profile</li>
  </ol>
</nav>
{% endblock %}

{% block content %}
{% from "common/form_macros.html" import render_field, render_submit_field %}
<div class="card">
  <form action="" method="POST" class="form" role="form">
    <div class="card-header">
      <strong>User Profile</strong>
    </div>
    <div class="card-body">
      {{ form.hidden_tag() }}
      <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Enter full name" value="{{ current_user.full_name }}">
      </div>
    </div>
    <div class="card-footer">
      <button type="submit" class="btn btn-sm btn-primary">Submit</button>
      <button type="reset" class="btn btn-sm btn-danger">Reset</button>
    </div>
  </form>
</div>
{% endblock %}
