{% extends "common/dark_base.html" %}

{% block breadcrumb %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb my-0">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item">Admin</li>
    <li class="breadcrumb-item"><a href="{{ url_for('main.user_admin_page') }}">Manage Users</a></li>
    <li class="breadcrumb-item active">User</li>
  </ol>
</nav>
{% endblock %}

{% block content %}
{% from "common/form_macros.html" import render_field, render_submit_field %}
<div class="card">
  <form action="" method="POST" class="form" role="form">
    <div class="card-header d-flex align-items-center">
      <strong>Create User</strong>
      <a href="{{ url_for('main.manage_user_roles', user_id=user.id) }}" class="btn btn-sm btn-primary ms-auto">Manage Roles</a>
    </div>
    <div class="card-body">
      {{ form.hidden_tag() }}
      <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Enter full name" value="{{ user.full_name }}">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="text" class="form-control" id="email" name="email" placeholder="Enter an email address" value="{{ user.email }}">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="text" class="form-control" id="password" name="password" placeholder="Enter password" value="">
      </div>
    </div>
    <div class="card-footer">
      <button type="submit" class="btn btn-sm btn-primary">Submit</button>
      <button type="reset" class="btn btn-sm btn-danger">Reset</button>
    </div>
  </form>
</div>
{% endblock %}
