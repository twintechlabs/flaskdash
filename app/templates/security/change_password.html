{% extends "common/dark_base.html" %}

{% block content %}

{% from "common/form_macros.html" import render_field, render_submit_field %}
  <!-- Breadcrumb-->
  <ol class="breadcrumb">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item">My Account</li>
    <li class="breadcrumb-item active">Change Password</li>
    <!-- Breadcrumb Menu-->
    <li class="breadcrumb-menu d-md-down-none">
      <div class="btn-group" role="group" aria-label="Button group">
        <a class="btn" href="#">
          <i class="icon-speech"></i>
        </a>
        <a class="btn" href="./">
          <i class="icon-graph"></i>  Dashboard</a>
        <a class="btn" href="#">
          <i class="icon-settings"></i>  Settings</a>
      </div>
    </li>
  </ol>
  <div class="container-fluid">
    <div class="animated fadeIn">
      <div class="card ">
        <form action="" method="POST" class="form" role="form">
          <div class="card-header ">
            <strong>Change Password</strong>
          </div>
          <div class="card-body ">
                {{ change_password_form.hidden_tag() }}
                <div class="form-group ">
                  <label for="nf-email ">Old Password</label>
                  <input class="form-control" id="password" name="password" tabindex="10" type="password" value="">
                </div>
                <div class="form-group ">
                  <label for="nf-password ">New Password</label>
                  <input class="form-control" id="new_password" name="new_password" tabindex="20" type="password" value="">
                </div>
                <div class="form-group ">
                  <label for="nf-password ">Confirm New Password</label>
                  <input class="form-control" id="new_password_confirm" name="new_password_confirm" tabindex="30" type="password" value="">
                </div>
          </div>
          <div class="card-footer ">
            <button type="submit " class="btn btn-sm btn-primary "><i class="far fa-circle-dot"></i> Submit</button>
            <button type="reset " class="btn btn-sm btn-danger "><i class="fas fa-ban"></i> Reset</button>
          </div>
        </form>
      </div>
</div>
{% endblock %}
